name: Assign Copilot to Issue

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  assign:
    if: github.event.label.name == 'agent-approved'
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check if copilot-working label already exists to avoid duplicate runs
            const labels = issue.labels.map(l => l.name);
            if (labels.includes('copilot-working')) {
              console.log('Copilot is already assigned — skipping');
              return;
            }

            // Try to assign Copilot via the assignees API
            let assigned = false;
            try {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: issue.number,
                assignees: ['copilot-swe-agent']
              });
              assigned = true;
              console.log('Assigned copilot-swe-agent via API');
            } catch (error) {
              console.warn('Could not assign copilot-swe-agent via API:', error.message);
            }

            // Fallback: post a comment to trigger Copilot
            if (!assigned) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: '@copilot fix this issue'
              });
              console.log('Posted @copilot comment as fallback');
            }

            // Add copilot-working label and remove agent-approved
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issue.number,
              labels: ['copilot-working']
            });

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: issue.number,
                name: 'agent-approved'
              });
            } catch (error) {
              console.warn('Could not remove agent-approved label:', error.message);
            }
