name: Assign Copilot to Issue

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  assign:
    if: github.event.label.name == 'agent-approved'
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check if copilot-working label already exists to avoid duplicate runs
            const labels = issue.labels.map(l => l.name);
            if (labels.includes('copilot-working')) {
              console.log('Copilot is already assigned — skipping');
              return;
            }

            // Assign Copilot via the REST API
            // The correct assignee name depends on how Copilot Coding Agent
            // is configured in your repo/org. Common values: 'copilot-swe-agent', 'copilot'.
            let assigned = false;
            const assigneeNames = ['copilot-swe-agent', 'copilot'];
            for (const assignee of assigneeNames) {
              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: issue.number,
                  assignees: [assignee]
                });
                assigned = true;
                console.log(`Assigned ${assignee} via REST API`);
                break;
              } catch (error) {
                console.warn(`Could not assign ${assignee}:`, error.message);
              }
            }

            // Fallback: use GraphQL replaceActorsForAssignable mutation
            if (!assigned) {
              try {
                // Look up the Copilot actor ID and issue node ID
                const { node_id: issueNodeId } = issue;
                // Attempt assignment via GraphQL — requires knowing the Copilot actor ID.
                // GitHub exposes it as an assignable actor on the repository.
                const assignableQuery = await github.graphql(`
                  query($owner: String!, $repo: String!) {
                    repository(owner: $owner, name: $repo) {
                      assignableUsers(first: 100) {
                        nodes {
                          id
                          login
                        }
                      }
                    }
                  }
                `, { owner, repo });

                const copilotActor = assignableQuery.repository.assignableUsers.nodes.find(
                  u => u.login.toLowerCase().includes('copilot')
                );

                if (copilotActor) {
                  await github.graphql(`
                    mutation($assignableId: ID!, $actorIds: [ID!]!) {
                      replaceActorsForAssignable(input: {
                        assignableId: $assignableId
                        actorIds: $actorIds
                      }) {
                        clientMutationId
                      }
                    }
                  `, {
                    assignableId: issueNodeId,
                    actorIds: [copilotActor.id]
                  });
                  assigned = true;
                  console.log(`Assigned Copilot via GraphQL (actor: ${copilotActor.login})`);
                }
              } catch (error) {
                console.warn('GraphQL assignment failed:', error.message);
              }
            }

            if (!assigned) {
              console.warn('All assignment methods failed. Adding a comment for manual assignment.');
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: '🤖 **Auto-assign:** Could not automatically assign Copilot. Please assign manually from the sidebar.'
              });
            }

            // Add copilot-working label and remove agent-approved
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issue.number,
              labels: ['copilot-working']
            });

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: issue.number,
                name: 'agent-approved'
              });
            } catch (error) {
              console.warn('Could not remove agent-approved label:', error.message);
            }
